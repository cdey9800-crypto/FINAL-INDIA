<script>
window.addEventListener('load', () => {
    const video = document.getElementById('mainVideo');
    if (!video) return;

    video.muted = true;

    video.play().then(() => {
        setTimeout(() => {
            video.pause();
            video.currentTime = 1;
        }, 1000);
    }).catch(() => {});

    video.addEventListener('play', () => {
        if (video.currentTime >= 1) {
            video.muted = false;
        }
    });
});
</script>
